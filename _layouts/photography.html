<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #0a0a0a !important; color: #bbb; font-family: 'Noto Sans', sans-serif; }
      .photo-wrapper { max-width: 1200px; margin: 0 auto; padding: 24px; }
      .top-nav {
        margin-bottom: 30px;
        display: flex;
        gap: 20px;
        font-size: 14px;
      }
      .top-nav a {
        color: #777;
        text-decoration: none;
        transition: color 0.2s;
      }
      .top-nav a:hover, .top-nav a.active { color: #fff; }
      h2 { color: #eee; font-size: 22px; margin-bottom: 6px; }
      h3 { color: #ddd; font-size: 16px; font-weight: 400; margin-top: 24px; margin-bottom: 4px; }
      p { font-size: 14px; line-height: 1.5; margin-bottom: 8px; }
      hr { border: none; border-top: 1px solid #222; margin: 16px 0; }
      a { color: #888; }
    </style>
  </head>
  <body>
    <div class="photo-wrapper">

      {% include nav.html %}

      {{ content }}

    </div>
  </body>
</html>
